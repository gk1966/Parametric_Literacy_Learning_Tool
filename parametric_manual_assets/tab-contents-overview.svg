<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="970" viewBox="0 0 1800 970" role="img" aria-labelledby="title desc">
  <title id="title">Parametric Literacy Tool tab contents overview</title>
  <desc id="desc">Single overview diagram showing the contents of the Basics, Color, Effects, Output, Literacy, and AI Tutor tabs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0a0f23"/>
    </linearGradient>
    <linearGradient id="tabActive" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a2a66"/>
      <stop offset="100%" stop-color="#142254"/>
    </linearGradient>
    <linearGradient id="tabAi" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2b2251"/>
      <stop offset="100%" stop-color="#181b3d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:36px;font-weight:800;fill:#e9ecf5}
      .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-weight:500;fill:#9aa3c7}
      .colTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:800;fill:#ffffff}
      .colSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#9aa3c7}
      .item{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:700;fill:#e9ecf5}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#9aa3c7}
      .tabText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .aiText{fill:#f5b841}
    </style>
  </defs>

  <rect width="1800" height="970" fill="url(#bg)"/>
  <rect x="28" y="28" width="1744" height="914" rx="22" fill="#121936" stroke="#1b254d" filter="url(#shadow)"/>

  <text x="60" y="82" class="title">Parametric Literacy Tool - Tab Contents Overview</text>

  <!-- Column backgrounds -->
  <g transform="translate(50 155)">
    <rect x="0" y="0" width="270" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>
    <rect x="300" y="0" width="270" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>
    <rect x="600" y="0" width="270" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>
    <rect x="900" y="0" width="270" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>
    <rect x="1200" y="0" width="270" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>
    <rect x="1500" y="0" width="170" height="790" rx="18" fill="#0f1530" stroke="#2a3672"/>

    <!-- Basics -->
    <g transform="translate(20 24)">
      <rect x="0" y="0" width="102" height="46" rx="10" fill="url(#tabActive)" stroke="#3a4782"/>
      <text x="51" y="29" text-anchor="middle" class="tabText">Basics</text>
      <text x="0" y="76" class="colSub">Tone and primary adjustments</text>
      <g transform="translate(0 102)">
        <rect width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="34" class="item">Brightness</text>
        <rect y="66" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="100" class="item">Contrast</text>
        <rect y="132" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="166" class="item">Shadows Recovery</text>
        <rect y="198" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="232" class="item">Highlights Recovery</text>
        <rect y="264" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="298" class="item">Saturation</text>
        <rect y="330" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="364" class="item">Hue Shift</text>
        <rect y="396" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="430" class="item">Gamma</text>
        <rect y="462" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="496" class="item">Levels: Black</text>
        <rect y="528" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="562" class="item">Levels: White</text>
        <rect y="594" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="628" class="item">Levels: Midtones</text>
      </g>
    </g>

    <!-- Color -->
    <g transform="translate(320 24)">
      <rect x="0" y="0" width="88" height="46" rx="10" fill="url(#tabActive)" stroke="#6ea8fe"/>
      <text x="44" y="29" text-anchor="middle" class="tabText">Color</text>
      <text x="0" y="76" class="colSub">Channel balance and color casts</text>
      <g transform="translate(0 102)">
        <rect width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="27" class="item">Shadows Red</text>
        <rect y="52" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="79" class="item">Shadows Green</text>
        <rect y="104" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="131" class="item">Shadows Blue</text>
        <rect y="156" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="183" class="item">Midtones Red</text>
        <rect y="208" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="235" class="item">Midtones Green</text>
        <rect y="260" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="287" class="item">Midtones Blue</text>
        <rect y="312" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="339" class="item">Highlights Red</text>
        <rect y="364" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="391" class="item">Highlights Green</text>
        <rect y="416" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="443" class="item">Highlights Blue</text>
        <rect y="468" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="495" class="item">Temperature (B-Y)</text>
        <rect y="520" width="230" height="42" rx="10" fill="#192351" stroke="#2a3672"/><text x="14" y="547" class="item">Tint (G-M)</text>
      </g>
    </g>

    <!-- Effects -->
    <g transform="translate(620 24)">
      <rect x="0" y="0" width="104" height="46" rx="10" fill="url(#tabActive)" stroke="#3a4782"/>
      <text x="52" y="29" text-anchor="middle" class="tabText">Effects</text>
      <text x="0" y="76" class="colSub">Detail, stylization, and artifacts</text>
      <g transform="translate(0 102)">
        <rect width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="34" class="item">Gaussian Blur</text>
        <rect y="66" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="100" class="item">Sharpen</text>
        <rect y="132" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="166" class="item">Grain</text>
        <rect y="198" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="232" class="item">Vignette</text>
        <rect y="264" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="298" class="item">Chromatic Aberration</text>
        <rect y="330" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="364" class="item">Pixelate</text>
        <rect y="396" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="430" class="item">Invert</text>
        <rect y="462" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="496" class="item">Desaturate</text>
        <rect y="528" width="230" height="54" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="562" class="item">Posterize</text>
      </g>
    </g>

    <!-- Output -->
    <g transform="translate(920 24)">
      <rect x="0" y="0" width="102" height="46" rx="10" fill="url(#tabActive)" stroke="#3a4782"/>
      <text x="51" y="29" text-anchor="middle" class="tabText">Output</text>
      <text x="0" y="76" class="colSub">Export and reproducibility options</text>
      <g transform="translate(0 102)">
        <rect width="230" height="64" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="38" class="item">Format</text><text x="16" y="55" class="small">PNG / JPG / WEBP</text>
        <rect y="82" width="230" height="64" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="120" class="item">Quality</text><text x="16" y="137" class="small">Lossy export setting</text>
        <rect y="164" width="230" height="78" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="198" class="item">PSD instructions</text><text x="16" y="216" class="small">Adds layered PSD request</text>
        <rect y="272" width="230" height="64" rx="12" fill="#0d1430" stroke="#263065"/><text x="16" y="310" class="item">Export image</text>
        <rect y="354" width="230" height="64" rx="12" fill="#0d1430" stroke="#263065"/><text x="16" y="392" class="item">Export JSON</text>
        <rect y="436" width="230" height="64" rx="12" fill="#0d1430" stroke="#263065"/><text x="16" y="474" class="item">Import JSON</text>
      </g>
    </g>

    <!-- Literacy -->
    <g transform="translate(1220 24)">
      <rect x="0" y="0" width="110" height="46" rx="10" fill="url(#tabActive)" stroke="#3a4782"/>
      <text x="55" y="29" text-anchor="middle" class="tabText">Literacy</text>
      <text x="0" y="76" class="colSub">Learning explanations and evidence</text>
      <g transform="translate(0 102)">
        <rect width="230" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="32" class="item">Parametric Literacy</text><text x="16" y="51" class="small">Visual results as explicit values</text>
        <rect y="90" width="230" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="122" class="item">Histogram Analysis</text><text x="16" y="141" class="small">Shadows, midtones, highlights</text>
        <rect y="180" width="230" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="212" class="item">Clipping / Data Loss</text><text x="16" y="231" class="small">Lost blacks and blown whites</text>
        <rect y="270" width="230" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="16" y="302" class="item">Reference Base</text><text x="16" y="321" class="small">DOI sources in help popups</text>
        <rect y="360" width="230" height="72" rx="12" fill="#0d1430" stroke="#263065"/><text x="16" y="392" class="item">Smart Tips</text><text x="16" y="411" class="small">Context-aware feedback</text>
        <rect y="450" width="230" height="72" rx="12" fill="#0d1430" stroke="#263065"/><text x="16" y="482" class="item">Parametric Breakdown</text><text x="16" y="501" class="small">Active setting summary</text>
      </g>
    </g>

    <!-- AI Tutor -->
    <g transform="translate(1520 24)">
      <rect x="0" y="0" width="126" height="46" rx="10" fill="url(#tabAi)" stroke="#3a4782"/>
      <text x="63" y="29" text-anchor="middle" class="tabText aiText">AI Tutor</text>
      <text x="0" y="76" class="colSub">Optional AI support</text>
      <g transform="translate(0 102)">
        <rect width="130" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="14" y="31" class="item">API setup</text><text x="14" y="51" class="small">Gemini key</text>
        <rect y="90" width="130" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="14" y="121" class="item">AI Image</text><text x="14" y="141" class="small">Critic</text>
        <rect y="180" width="130" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="14" y="211" class="item">Workflow</text><text x="14" y="231" class="small">Translator</text>
        <rect y="270" width="130" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="14" y="301" class="item">Quick Quiz</text><text x="14" y="321" class="small">Knowledge test</text>
        <rect y="360" width="130" height="72" rx="12" fill="#192351" stroke="#2a3672"/><text x="14" y="391" class="item">Ask Tutor</text><text x="14" y="411" class="small">Q and A</text>
        <rect y="450" width="130" height="72" rx="12" fill="#0d1430" stroke="#263065"/><text x="14" y="481" class="item">Privacy</text><text x="14" y="501" class="small">Confirm</text>
      </g>
    </g>
  </g>

</svg>
